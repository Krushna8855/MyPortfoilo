<header class="navbar-header" [class.scrolled]="isScrolled">
  <div class="nav-container">
    <div class="logo">
      <a routerLink="/"><span>K</span>rushna</a>
    </div>

    <!-- 🍔 Hamburger Menu Button -->
    <button class="menu-toggle" [class.active]="isMenuOpen" (click)="toggleMenu()" aria-label="Toggle Navigation">
      <div class="hamburger"></div>
    </button>

    <!-- 🧭 Navigation Links -->
    <nav class="nav-menu" [class.open]="isMenuOpen">
      <ul class="nav-links">
        @for (link of navLinks; track link.name) {
          <li [style.transition-delay]="$index * 100 + 'ms'">
            <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">
              <i class="{{ link.icon }}"></i>
              <span>{{ link.name }}</span>
            </a>
          </li>
        }
      </ul>

      <div class="nav-actions">
        <a href="https://github.com/Krushna8855" target="_blank" class="social-link" title="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://linkedin.com/in/krushna-ghotekar" target="_blank" class="social-link" title="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
        <a href="mailto:krishnaghotekar7876@gmail.com" class="cta-mini">Hire Me</a>
      </div>
    </nav>
  </div>
</header>
<div class="overlay" [class.active]="isMenuOpen" (click)="closeMenu()"></div>
