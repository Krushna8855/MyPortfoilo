<section class="skills-section container">
  <div class="section-header" data-aos="fade-up">
    <h2 class="section-title"><span>02.</span> Technical Skills</h2>
    <div class="header-line"></div>
  </div>

  <div class="skills-tabs" data-aos="fade-up">
    <button [class.active]="activeTab === 'frontend'" (click)="setTab('frontend')">Frontend</button>
    <button [class.active]="activeTab === 'backend'" (click)="setTab('backend')">Backend</button>
    <button [class.active]="activeTab === 'mobile'" (click)="setTab('mobile')">Mobile</button>
    <button [class.active]="activeTab === 'tools'" (click)="setTab('tools')">Tools</button>
  </div>

  <div class="skills-grid">
    @for (skill of filteredSkills; track skill.name) {
      <div class="skill-card glass" data-aos="zoom-in" [style.animation-delay]="$index * 50 + 'ms'">
        <div class="skill-icon-box">
          @if (skill.link) {
            <a [href]="skill.link" target="_blank">
              <i [class]="skill.icon"></i>
            </a>
          } @else {
            <i [class]="skill.icon"></i>
          }
        </div>
        <span class="skill-name">{{ skill.name }}</span>
      </div>
    }
  </div>
</section>
