<section class="contact-section container" id="contact">
  <div class="section-header centered" data-aos="fade-up">
    <h2 class="section-title"><span>04.</span> What’s Next?</h2>
  </div>

  <div class="contact-content" data-aos="fade-up">
    <h3 class="contact-title">Get In Touch</h3>
    <p class="contact-desc">
      Although I’m not currently looking for any new opportunities, my inbox is always open. Whether you have a question or just want to say hi, I’ll try my best to get back to you!
    </p>
    
    <div class="contact-btns">
      <a [href]="'mailto:' + email" class="neon-btn">Say Hello</a>
    </div>

    <div class="contact-info">
      <div class="info-item">
        <i class="fas fa-phone"></i>
        <span>{{ phone }}</span>
      </div>
      <div class="info-item">
        <i class="fab fa-linkedin-in"></i>
        <a [href]="linkedIn" target="_blank">LinkedIn Profile</a>
      </div>
    </div>
  </div>
</section>
