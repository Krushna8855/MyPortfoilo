<section class="education-section container" id="education">
  <div class="section-header" data-aos="fade-up">
    <h2 class="section-title"><span>05.</span> Education</h2>
    <div class="header-line"></div>
  </div>

  <div class="education-grid">
    @for (edu of education; track edu.institution) {
      <div class="education-card glass" data-aos="fade-up" [style.animation-delay]="$index * 100 + 'ms'">
        <div class="edu-icon-box">
          <i [class]="edu.icon"></i>
        </div>
        <div class="edu-details">
          <h3 class="edu-institution">{{ edu.institution }}</h3>
          <p class="edu-degree">{{ edu.degree }}</p>
          <div class="edu-footer">
            <span class="edu-year">{{ edu.year }}</span>
            <span class="edu-percentage">{{ edu.percentage }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</section>
