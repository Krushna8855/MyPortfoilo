<section class="projects-section container">
  <div class="section-header" data-aos="fade-up">
    <h2 class="section-title"><span>03.</span> Some Things I’ve Built</h2>
    <div class="header-line"></div>
  </div>

  <div class="projects-grid">
    @for (project of projects; track project.name) {
      <div class="project-card" data-aos="fade-up" [style.animation-delay]="$index * 100 + 'ms'">
        <div class="project-inner glass">
          <div class="project-image-wrapper">
            <img [src]="project.image" [alt]="project.name" class="project-img">
            <div class="project-overlay">
              <div class="project-links">
                @if (project.link) {
                  <a [href]="project.link" target="_blank" title="External Link">
                    <i class="fas fa-external-link-alt"></i>
                  </a>
                }
                @if (project.github) {
                  <a [href]="project.github" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                  </a>
                }
              </div>
            </div>
          </div>
          
          <div class="project-body">
            <div class="project-header">
              <div class="folder">
                <i class="far fa-folder"></i>
              </div>
              <h3 class="project-title">{{ project.name }}</h3>
            </div>
            
            <div class="project-description">
              <p>{{ project.description }}</p>
            </div>
            
            <ul class="project-tech-list">
              @for (tech of project.technologies; track tech) {
                <li>{{ tech }}</li>
              }
            </ul>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="more-projects">
    <a href="https://github.com/Krushna8855" target="_blank" class="neon-btn">More on GitHub</a>
  </div>
</section>
